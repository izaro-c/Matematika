# SonarCloud project properties
# Requiere: SONAR_TOKEN en GitHub Secrets y proyecto creado en https://sonarcloud.io
sonar.organization=izaro-c
sonar.projectKey=izaro-c_Matematika
sonar.projectName=Matematika
sonar.projectVersion=1.0

# Rutas de fuentes
sonar.sources=src
sonar.tests=tests
sonar.language=ts

# Reportes externos
sonar.typescript.eslint.reportPaths=eslint-report.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusiones
sonar.exclusions=src/**/*.d.ts,src/vite-env.d.ts
sonar.test.exclusions=tests/scripts/**

# Encoding
sonar.sourceEncoding=UTF-8
