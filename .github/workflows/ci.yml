name: CI Pipeline (Quality & Tests)

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  validate:
    name: Lint, Test and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter (ESLint + SonarJS)
        run: npm run lint

      - name: Validate BCED Architecture (dependency-cruiser)
        run: npm run depcruise

      - name: Run Unit Tests
        run: npm run test

      - name: Validate MDX Content & References
        # The prebuild script generates the index and validates cross-references and graph logic
        run: npm run prebuild

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
