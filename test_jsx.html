<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
</head>
<body>
  <div id="box" style="width:500px; height:500px;"></div>
  <script>
    var board = JXG.JSXGraph.initBoard('box', {boundingbox: [-5, 5, 5, -5], axis:true});
    var p1 = board.create('point', [-2, -2]);
    var p2 = board.create('point', [2, 2]);
    var l = board.create('line', [p1, p2], {withLabel: true, name: 'm'});
    
    setTimeout(() => {
      // How do we change the font size?
      l.label.setAttribute({ fontSize: 30 });
      // How do we change the position along the line?
      l.label.setAttribute({ position: 0.2 }); 
      // Does position work if it's a number?
      
      board.update();
      console.log("Size:", l.label.visProp.fontsize);
      console.log("Position:", l.label.visProp.position);
    }, 500);
  </script>
</body>
</html>
